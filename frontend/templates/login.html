<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login | Presensi Polda Kalsel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0b1c2d, #000814);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-box {
            background: rgba(10, 25, 47, 0.96);
            padding: 35px 40px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 153, 255, 0.35);
            text-align: center;
        }

        .logo {
            width: 90px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 13px;
            font-weight: normal;
            color: #9bb7d4;
            margin-bottom: 25px;
        }

        label {
            font-size: 13px;
            color: #cfd8e3;
            display: block;
            text-align: left;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #1f4068;
            border-radius: 6px;
            outline: none;
            background: #14213d;
            color: #fff;
        }

        input:focus {
            border-color: #1d8cf8;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #003566;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: #00509d;
        }

        button:disabled {
            background: #1f4068;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 0, 0, 0.15);
            border-left: 4px solid #ff4d4d;
            color: #ffb3b3;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 18px;
            font-size: 13px;
            text-align: left;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #7a8ca3;
        }
    </style>

    <script>
        function showLoading() {
            const btn = document.getElementById("loginBtn");
            const spinner = document.getElementById("spinner");
            btn.disabled = true;
            spinner.style.display = "inline-block";
            btn.querySelector("span").innerText = "Memverifikasi...";
        }
    </script>
</head>
<body>

<div class="login-box">
    <!-- LOGO POLRI -->
    <img src="/static/logo-polri.png" alt="logo polri" class="logo">

    <h1>PRESENSI ANGGOTA POLRI</h1>
    <h2>Polda Kalimantan Selatan</h2>

    {% if error %}
        <div class="error">
            ⚠️ {{ error }}
        </div>
    {% endif %}

   <form action="/auth/login" method="post" onsubmit="showLoading()">
        <label>Username / Email</label>
        <input type="text" name="email" placeholder="Masukkan username atau email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password" required autocomplete="off">

        <button type="submit" id="loginBtn">
            <div id="spinner" class="spinner"></div>
            <span>LOGIN</span>
        </button>
    </form>

    <div class="footer-text">
        © Kepolisian Negara Republik Indonesia<br>
        Cyber Crime Investigation & Monitoring System
    </div>
</div>

</body>
</html>
