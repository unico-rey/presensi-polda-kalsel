<!-- app/templates/absensi.html -->
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Presensi Anggota - Polda Kalsel</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    .scan-line {
      position: absolute; width: 100%; height: 2px;
      background: #22d3ee; box-shadow: 0 0 15px #22d3ee;
      animation: scan 2s linear infinite; z-index: 10;
    }
    .glass {
      background: rgba(10, 25, 47, 0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 243, 255, 0.2);
    }
    #signature-pad {
      border: 2px dashed #9ca3af;
      background: #ffffff;
      cursor: crosshair;
    }
    .status-badge {
      padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: bold; text-transform: uppercase;
    }
  </style>
</head>
<body class="bg-[#020617] text-gray-100 min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

  <!-- Notification Banner (otomatis muncul saat waktunya) -->
  <div id="notiBanner" class="fixed top-0 left-0 right-0 z-[9999] transform -translate-y-full transition-transform duration-500 ease-out">
      <div id="notiBannerInner" class="px-4 py-3 flex items-center gap-3 shadow-2xl">
          <div id="notiIcon" class="shrink-0 text-2xl">&#9200;</div>
          <div class="flex-1 min-w-0">
              <div id="notiTitle" class="font-black text-sm uppercase tracking-wide"></div>
              <div id="notiText" class="text-xs font-semibold mt-0.5 opacity-90"></div>
          </div>
          <button onclick="tutupBanner()" class="shrink-0 opacity-70 hover:opacity-100 text-lg font-bold px-2">&#10005;</button>
      </div>
      <div id="notiProgress" class="h-1 w-full bg-white/30 origin-left scale-x-100 transition-transform"></div>
  </div>

  <div class="max-w-lg w-full space-y-6 glass p-6 rounded-3xl shadow-[0_0_50px_rgba(0,153,255,0.2)]">
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-20 h-20 mb-4">
        <img src="/static/logo-polri.png" alt="Logo Polri" class="w-full h-full object-contain drop-shadow-[0_0_15px_rgba(0,153,255,0.4)]">
      </div>
      <h1 class="text-2xl font-black text-white tracking-tight">SISTEM PRESENSI</h1>
      <p class="text-xs text-cyan-400/60 font-bold tracking-widest uppercase">Polda Kalimantan Selatan</p>
    </div>

    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
      <label class="block text-xs text-gray-400 font-bold mb-2 uppercase"><i class="fa-solid fa-user text-cyan-400 mr-2"></i>Pilih Nama Anda</label>
      <select id="memberSelector" name="id_anggota" form="absensiForm" class="w-full bg-[#111827] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none" required>
        <option value="" disabled selected>-- Pilih Nama Anggota --</option>
        {% for ag in semua_anggota %}
        <option value="{{ ag.id_anggota }}">{{ ag.nama }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Notifikasi Status (auto-registered) -->
    <div id="notifStatusBar" class="p-3 bg-indigo-500/5 border border-indigo-500/20 rounded-2xl flex items-center gap-3 hidden">
        <div class="h-8 w-8 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 shrink-0">
            <i id="notifIcon" class="fa-solid fa-mobile-screen-button"></i>
        </div>
        <div class="flex-1 min-w-0">
            <p id="notifStatusText" class="text-[9px] text-gray-400 font-bold leading-tight">Memeriksa status notifikasi...</p>
        </div>
        <div id="notifSpinner" class="hidden">
            <i class="fa-solid fa-spinner fa-spin text-indigo-400 text-xs"></i>
        </div>
    </div>


    <!-- GPS Display with Leaflet Map -->
    <div class="space-y-2">
      <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">LOKASI (Aktifkan)</label>
      <div class="bg-black/40 p-3 rounded-2xl border border-white/5 space-y-3">
        <p id="latlonDisplay" class="text-xs text-cyan-400 font-mono tracking-wider">Sedang mendeteksi lokasi...</p>
        <div class="relative overflow-hidden rounded-xl border border-white/10 hidden" id="mapContainer">
          <div id="map" class="w-full h-32 z-0"></div>
        </div>
      </div>
    </div>

    <form id="absensiForm" action="/absensi/submit" method="POST" class="space-y-6">
      <input type="hidden" name="lat" id="latInput">
      <input type="hidden" name="lon" id="lonInput">
      <input type="hidden" name="foto" id="fotoInput">
      <input type="hidden" name="tanda_tangan" id="ttdInput">
      
      <!-- Tipe Absen -->
      <div class="space-y-2">
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Status Kehadiran</label>
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-2">
            <label class="w-full">
              <input type="radio" name="tipe" value="hadir" checked onclick="toggleCamera(true)" class="hidden peer">
              <div class="text-center py-2 rounded-xl cursor-pointer transition-all peer-checked:bg-cyan-500 peer-checked:text-black hover:bg-white/5 text-gray-400 font-bold text-[10px] border border-white/5 uppercase">
                Masuk Pagi
              </div>
            </label>
            <label class="w-full">
              <input type="radio" name="tipe" value="terlambat" onclick="toggleCamera(true)" class="hidden peer">
              <div class="text-center py-2 rounded-xl cursor-pointer transition-all peer-checked:bg-red-500 peer-checked:text-white hover:bg-white/5 text-gray-400 font-bold text-[10px] border border-white/5 uppercase">
                Terlambat
              </div>
            </label>
            <label class="w-full">
              <input type="radio" name="tipe" value="sakit" onclick="toggleCamera(false)" class="hidden peer">
              <div class="text-center py-2 rounded-xl cursor-pointer transition-all peer-checked:bg-purple-600 peer-checked:text-white hover:bg-white/5 text-gray-400 font-bold text-[10px] border border-white/5 uppercase">
                Sakit
              </div>
            </label>
            <label class="w-full">
              <input type="radio" name="tipe" value="ijin" onclick="toggleCamera(false)" class="hidden peer">
              <div class="text-center py-2 rounded-xl cursor-pointer transition-all peer-checked:bg-orange-500 peer-checked:text-white hover:bg-white/5 text-gray-400 font-bold text-[10px] border border-white/5 uppercase">
                Izin
              </div>
            </label>

            <label class="w-full">
              <input type="radio" name="tipe" value="pulang_siang" onclick="toggleCamera(true)" class="hidden peer">
              <div class="text-center py-2 rounded-xl cursor-pointer transition-all peer-checked:bg-yellow-500 peer-checked:text-black hover:bg-white/5 text-gray-400 font-bold text-[10px] border border-white/5 uppercase">
                Pulang Siang
              </div>
            </label>
        </div>
      </div>

      <!-- Camera Section -->
      <div id="cameraSection" class="space-y-4">
        <div class="relative overflow-hidden rounded-2xl bg-black aspect-video flex items-center justify-center border-2 border-cyan-500/20 group">
          
          <div id="cameraStartOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-20">
              <i class="fa-solid fa-video-slash text-gray-500 text-4xl mb-4"></i>
              <button type="button" onclick="initCamera()" class="bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-3 rounded-xl font-black text-xs transition-all shadow-[0_0_20px_rgba(0,255,255,0.3)] tracking-widest uppercase">
                  <i class="fa-solid fa-camera mr-2"></i> Izinkan & Aktifkan Kamera
              </button>
          </div>

          <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
          <canvas id="photoCanvas" class="hidden"></canvas>
          <div id="scanLine" class="scan-line hidden"></div>
          
          <div id="captureBtnContainer" class="absolute bottom-4 inset-x-0 flex justify-center hidden z-10">
            <button type="button" id="captureBtn" onclick="takePhoto()" class="bg-white text-black px-6 py-2 rounded-xl font-black text-xs hover:bg-cyan-400 transition-colors shadow-2xl tracking-widest">
              <i class="fa-solid fa-camera mr-2"></i> SCAN FOTO
            </button>
          </div>
          <div id="photoPreviewContainer" class="absolute inset-0 bg-black hidden z-30">
            <img id="photoPreview" class="w-full h-full object-cover">
            <button type="button" onclick="retakePhoto()" class="absolute top-4 right-4 bg-red-500 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Form Sakit/Ijin (Hidden by default) -->
      <div id="manualForm" class="hidden space-y-4 animate-in slide-in-from-top duration-300">
        <div class="bg-white/5 p-4 rounded-2xl border border-white/5 space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Keterangan Khusus</label>
            <textarea name="status_manual" rows="3" placeholder="Contoh: Berobat (Lampirkan SKD), Tugas Luar, atau Urusan Keluarga..." class="w-full bg-[#111827] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none resize-none"></textarea>
          </div>
          <div class="pt-2 border-t border-white/10">
            <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Lampiran Foto / Surat</label>
            <input type="file" id="suratUpload" accept="image/*,.pdf,.doc,.docx" class="w-full text-sm text-gray-400 file:cursor-pointer custom-file-input file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-cyan-500/10 hover:file:bg-cyan-500/20 file:text-cyan-400 transition-all">
          </div>
        </div>
      </div>

      <!-- Signature Section -->
      <div class="space-y-3">
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Tanda Tangan Digital</label>
        <div class="relative rounded-2xl overflow-hidden bg-white">
          <canvas id="signature-pad" class="w-full h-40 rounded-2xl"></canvas>
          <button type="button" onclick="clearSignature()" class="absolute top-2 right-2 text-[10px] bg-red-100 text-red-600 border border-red-200 px-3 py-1 rounded-lg hover:bg-red-500 hover:text-white transition-all shadow-md">
            <i class="fa-solid fa-eraser mr-1"></i> HAPUS
          </button>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-2xl transition-all shadow-[0_0_30px_rgba(0,255,255,0.3)] uppercase tracking-wider disabled:opacity-50 disabled:cursor-not-allowed">
        <i class="fa-solid fa-paper-plane mr-2"></i> KIRIM PRESENSI SEKARANG
      </button>
    </form>
    
    <div class="text-center pt-2 flex justify-between px-4">
        <a href="/auth/login" class="text-xs text-cyan-600 font-bold hover:text-cyan-400 transition-colors">
            <i class="fa-solid fa-lock mr-1"></i> Admin Access
        </a>
    </div>
  </div>

  <!-- Push Notification Registration -->
  <script src="/static/js/push-register.js"></script>
  <script>
    // ====== Auto Push Notification Registration ======
    // Dipanggil otomatis saat anggota memilih nama di dropdown
    async function autoRegisterNotif(idAnggota) {
        const statusBar = document.getElementById('notifStatusBar');
        const statusText = document.getElementById('notifStatusText');
        const icon = document.getElementById('notifIcon');
        const spinner = document.getElementById('notifSpinner');

        if (!idAnggota) return;

        // Cek dukungan browser
        if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
            statusBar.classList.remove('hidden');
            statusBar.className = statusBar.className.replace('border-indigo-500/20 bg-indigo-500/5', 'border-red-500/20 bg-red-500/5');
            icon.className = 'fa-solid fa-bell-slash text-red-400';
            statusText.textContent = 'Browser ini tidak mendukung notifikasi push.';
            statusText.className = 'text-[9px] text-red-400 font-bold leading-tight';
            return;
        }

        // Cek permission sudah granted atau belum
        // Jika sudah blocked, jangan tampilkan apapun
        if (Notification.permission === 'denied') {
            statusBar.classList.remove('hidden');
            icon.className = 'fa-solid fa-bell-slash text-red-400';
            statusText.innerHTML = 'Notifikasi diblokir browser. Aktifkan di <b>Pengaturan Browser</b>.';
            statusText.className = 'text-[9px] text-red-400 font-bold leading-tight';
            return;
        }

        // Tampilkan status bar & spinner
        statusBar.classList.remove('hidden');
        spinner.classList.remove('hidden');
        icon.className = 'fa-solid fa-spinner fa-spin text-indigo-400';
        statusText.textContent = 'Mendaftarkan notifikasi secara otomatis...';
        statusText.className = 'text-[9px] text-gray-400 font-bold leading-tight';

        const success = await window.registerPushNotification(idAnggota);
        spinner.classList.add('hidden');

        if (success) {
            statusBar.classList.remove('border-indigo-500/20');
            statusBar.classList.add('border-green-500/20');
            statusBar.style.background = 'rgba(34,197,94,0.05)';
            icon.className = 'fa-solid fa-bell text-green-400';
            statusText.innerHTML = '✅ Notifikasi aktif! Pengingat absen akan muncul otomatis.';
            statusText.className = 'text-[9px] text-green-400 font-bold leading-tight';
        } else {
            statusBar.classList.remove('border-indigo-500/20');
            statusBar.classList.add('border-yellow-500/20');
            statusBar.style.background = 'rgba(234,179,8,0.05)';
            icon.className = 'fa-solid fa-bell text-yellow-400';
            statusText.innerHTML = '⚠️ Izinkan notifikasi di browser untuk pengingat otomatis.';
            statusText.className = 'text-[9px] text-yellow-400 font-bold leading-tight';
        }
    }

    // Trigger otomatis saat anggota memilih nama
    document.getElementById('memberSelector').addEventListener('change', function() {
        autoRegisterNotif(this.value);
    });

    // Jika ada pilihan tersimpan di sessionStorage (navigasi balik)
    window.addEventListener('DOMContentLoaded', function() {
        const savedId = sessionStorage.getItem('lastIdAnggota');
        const selector = document.getElementById('memberSelector');
        if (savedId) {
            selector.value = savedId;
            if (selector.value === savedId) autoRegisterNotif(savedId);
        }
    });

    // Simpan pilihan ke sessionStorage agar tidak perlu ulang pilih
    document.getElementById('memberSelector').addEventListener('change', function() {
        sessionStorage.setItem('lastIdAnggota', this.value);
    });

    const video = document.getElementById('video');

    const canvas = document.getElementById('photoCanvas');
    const photoInput = document.getElementById('fotoInput');
    const photoPreview = document.getElementById('photoPreview');
    const photoPreviewContainer = document.getElementById('photoPreviewContainer');
    const signatureCanvas = document.getElementById('signature-pad');
    const ttdInput = document.getElementById('ttdInput');
    const ctx = signatureCanvas.getContext('2d');
    let isDrawing = false;

    // Camera Logic
    async function initCamera() {
      // Tampilkan loading state pada tombol
      const btn = document.querySelector('#cameraStartOverlay button');
      const originHtml = btn.innerHTML;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Meminta Izin...';
      btn.disabled = true;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
        document.getElementById('cameraStartOverlay').classList.add('hidden');
        document.getElementById('scanLine').classList.remove('hidden');
        document.getElementById('captureBtnContainer').classList.remove('hidden');
      } catch (err) {
        console.error("Camera Error:", err);
        let errorMsg = "Gagal mengakses kamera.";
        
        if (err.name === 'NotAllowedError') {
            errorMsg = "⚠️ Izin Kamera Ditolak. Harap aktifkan izin kamera di pengaturan browser Anda.";
        } else if (err.name === 'NotFoundError') {
            errorMsg = "⚠️ Perangkat kamera tidak ditemukan.";
        } else {
            errorMsg = "⚠️ Gagal memulai kamera: " + err.message;
        }
        
        alert(errorMsg);
        btn.innerHTML = originHtml;
        btn.disabled = false;
      }
    }

    function takePhoto() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      photoInput.value = dataUrl;
      photoPreview.src = dataUrl;
      photoPreviewContainer.classList.remove('hidden');
      document.getElementById('scanLine').classList.add('hidden');
    }

    function retakePhoto() {
        photoPreviewContainer.classList.add('hidden');
        document.getElementById('scanLine').classList.remove('hidden');
        photoInput.value = '';
    }

    // Signature Logic
    function initSignature() {
        // Adjust canvas size to display size
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        signatureCanvas.width = signatureCanvas.offsetWidth * ratio;
        signatureCanvas.height = signatureCanvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        
        // Fill white background
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, signatureCanvas.width, signatureCanvas.height);
        
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
    }

    function startDrawing(e) {
        isDrawing = true;
        draw(e);
    }

    function draw(e) {
        if (!isDrawing) return;
        const rect = signatureCanvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            ctx.beginPath();
            ttdInput.value = signatureCanvas.toDataURL();
        }
    }

    function clearSignature() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, signatureCanvas.width, signatureCanvas.height);
        ttdInput.value = '';
    }

    signatureCanvas.addEventListener('mousedown', startDrawing);
    signatureCanvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);
    
    signatureCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
    signatureCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    signatureCanvas.addEventListener('touchend', stopDrawing);

    // Toggle Sections
    function toggleCamera(show) {
        if(show) {
            document.getElementById('cameraSection').classList.remove('hidden');
            document.getElementById('manualForm').classList.add('hidden');
        } else {
            document.getElementById('cameraSection').classList.add('hidden');
            document.getElementById('manualForm').classList.remove('hidden');
        }
    }

    // Photo/File Upload for manual form
    document.getElementById('suratUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 1048576) { // 1 MB limit
                alert("⚠️ Gagal: Ukuran file terlalu besar! Maksimal 1 MB.");
                this.value = ''; // Reset input file
                photoInput.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                photoInput.value = e.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            if (['sakit', 'ijin'].includes(document.querySelector('input[name="tipe"]:checked').value)) {
                photoInput.value = '';
            }
        }
    });

    // Geolocation
    let map = null;
    let marker = null;
    function initGeo() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          document.getElementById('latInput').value = lat;
          document.getElementById('lonInput').value = lon;
          document.getElementById('latlonDisplay').innerHTML = `<i class="fa-solid fa-location-dot text-cyan-400 mr-2"></i> ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
          
          document.getElementById('mapContainer').classList.remove('hidden');
          if(!map) {
              map = L.map('map', {zoomControl: false}).setView([lat, lon], 16);
              L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                  maxZoom: 19
              }).addTo(map);
              marker = L.marker([lat, lon]).addTo(map);
          } else {
              map.setView([lat, lon]);
              marker.setLatLng([lat, lon]);
          }
        }, (err) => {
          console.error(err);
          let errorMsg = "Gagal mendeteksi lokasi";
          if (err.code === 1) {
              errorMsg = "⚠️ Izin lokasi ditolak. Harap izinkan GPS di browser.";
          } else if (err.code === 2) {
              errorMsg = "⚠️ Lokasi tidak tersedia (Sinyal Lemah).";
          } else if (err.code === 3) {
              errorMsg = "⚠️ Waktu tunggu GPS habis (Timeout).";
          }
          document.getElementById('latlonDisplay').innerHTML = `<span class="text-red-500 font-bold italic">${errorMsg}</span>`;
        }, { enableHighAccuracy: true, timeout: 10000 });
      } else {
          document.getElementById('latlonDisplay').innerHTML = `<span class="text-red-500">Browser Anda tidak mendukung GPS.</span>`;
      }
    }

    // Form Validation
    document.getElementById('absensiForm').onsubmit = function(e) {
        const type = document.querySelector('input[name="tipe"]:checked').value;
        const idAnggota = document.querySelector('select[name="id_anggota"]').value;
        
        // Geofencing Validation
        const isGeofenceActive = "{{ settings.get('geofence_active', '1') }}" === "1";
        if (isGeofenceActive && ['hadir', 'terlambat', 'pulang_siang', 'pulang'].includes(type)) {
            const poldaLat = parseFloat("{{ settings.get('polda_lat', '-3.488661') }}");
            const poldaLon = parseFloat("{{ settings.get('polda_lon', '114.831166') }}");
            const maxRadius = parseFloat("{{ settings.get('geofence_radius', '200') }}");
            const userLat = parseFloat(document.getElementById('latInput').value);
            const userLon = parseFloat(document.getElementById('lonInput').value);

            if (isNaN(userLat) || isNaN(userLon)) {
                alert("⚠️ PRESENSI DITOLAK: Gagal mendapatkan lokasi GPS Anda. Pastikan GPS aktif, izinkan akses lokasi di browser, dan tunggu sampai lokasi ditemukan.");
                e.preventDefault();
                return false;
            }

            // Calculate distance using Haversine formula
            const R = 6371e3; // Earth radius in meters
            const φ1 = poldaLat * Math.PI/180;
            const φ2 = userLat * Math.PI/180;
            const Δφ = (userLat - poldaLat) * Math.PI/180;
            const Δλ = (userLon - poldaLon) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c;

            if (distance > maxRadius) {
                alert(`🛑 PRESENSI DITOLAK!\n\nJarak Anda saat ini: ${Math.round(distance)} meter dari titik pusat.\nBatas Maksimal: ${maxRadius} meter.\n\nAnda berada di luar area presensi. Silakan masuk ke dalam jangkauan area kantor untuk melakukan absen.`);
                e.preventDefault();
                return false;
            }
        }
        if (!idAnggota) {
            alert("Harap pilih nama Anda!");
            e.preventDefault();
            return false;
        }
        if (['hadir', 'terlambat', 'pulang_siang'].includes(type) && !photoInput.value) {
            alert("Harap ambil (Scan) foto wajah terlebih dahulu!");
            e.preventDefault();
            return false;
        }
        if (type === 'ijin' && !photoInput.value) {
            alert("Harap lampirkan Foto Bukti / Surat Anda terlebih dahulu!");
            e.preventDefault();
            return false;
        }
        if (!ttdInput.value) {
            alert("Harap isi tanda tangan digital!");
            e.preventDefault();
            return false;
        }
    };

    window.onload = () => {
      initSignature();
      initGeo();
      
      const urlParams = new URLSearchParams(window.location.search);
      if(urlParams.get('success')) {
          alert("Presensi berhasil dicatat!");
          window.history.replaceState({}, document.title, window.location.pathname);
      } else if(urlParams.get('error')) {
          alert("Gagal: " + urlParams.get('error').replace(/_/g, ' '));
          window.history.replaceState({}, document.title, window.location.pathname);
      }
    };

    // ====================================================
    // SISTEM NOTIFIKASI OTOMATIS (Tanpa Push Subscription)
    // ====================================================
    var _notiState = { shown: null, browserGranted: false };

    // Minta izin Notification browser sekali saat halaman dibuka
    function mintaIzinNotif() {
        if (!("Notification" in window)) return;
        if (Notification.permission === "default") {
            Notification.requestPermission().then(function(p) {
                _notiState.browserGranted = (p === "granted");
            });
        } else {
            _notiState.browserGranted = (Notification.permission === "granted");
        }
    }

    // Tampilkan browser Notification (popup OS)
    function tampilBrowserNotif(title, body, icon) {
        if (!_notiState.browserGranted) return;
        try {
            new Notification(title, {
                body: body,
                icon: icon || "/static/logo-polri.png",
                badge: "/static/logo-polri.png",
                requireInteraction: true   // Tidak auto-dismiss sampai diklik
            });
        } catch(e) {}
    }

    // Tutup banner
    function tutupBanner() {
        var b = document.getElementById('notiBanner');
        b.style.transform = 'translateY(-100%)';
        _notiState.shown = null;
    }

    // Tampilkan banner
    function tampilBanner(level, title, text) {
        var b = document.getElementById('notiBanner');
        var inner = document.getElementById('notiBannerInner');
        var icon = document.getElementById('notiIcon');
        var titleEl = document.getElementById('notiTitle');
        var textEl = document.getElementById('notiText');
        var progress = document.getElementById('notiProgress');

        if (level === 'urgent') {
            // Merah — jam sudah tiba
            inner.style.background = 'linear-gradient(135deg, #7f1d1d, #991b1b)';
            inner.style.color = '#fca5a5';
            progress.style.background = '#f87171';
            icon.textContent = '🔴';
        } else {
            // Kuning — 30 menit sebelum
            inner.style.background = 'linear-gradient(135deg, #78350f, #92400e)';
            inner.style.color = '#fde68a';
            progress.style.background = '#fbbf24';
            icon.textContent = '⚠️';
        }

        titleEl.textContent = title;
        textEl.textContent = text;
        b.style.transform = 'translateY(0)';

        // Auto-dismiss hanya untuk warning (bukan urgent)
        if (level === 'warning') {
            setTimeout(function() {
                if (_notiState.shown === 'warning') tutupBanner();
            }, 10000);
        }
    }

    function checkNotification() {
        var isFriday = new Date().getDay() === 5;
        var jamMasukStr  = isFriday ? "{{ settings.get('jam_masuk_jumat',  '07:00') }}" : "{{ settings.get('jam_masuk_normal',  '08:00') }}";
        var jamPulangStr = isFriday ? "{{ settings.get('jam_pulang_jumat', '15:30') }}" : "{{ settings.get('jam_pulang_normal', '15:00') }}";
        var menitSebelum = parseInt("{{ settings.get('notif_menit_sebelum', '30') }}") || 30;

        var now = new Date();
        function parseTime(s) {
            var p = s.split(':');
            var d = new Date(now);
            d.setHours(parseInt(p[0]), parseInt(p[1]), 0, 0);
            return d;
        }

        var tMasuk  = parseTime(jamMasukStr);
        var tPulang = parseTime(jamPulangStr);
        var tMasukWarn  = new Date(tMasuk  - menitSebelum * 60000);
        var tPulangWarn = new Date(tPulang - menitSebelum * 60000);

        var nowMs   = now.getTime();
        var key     = null;
        var level   = null;
        var title   = "";
        var text    = "";
        var bTitle  = "";
        var bBody   = "";

        // Cek apakah TEPAT saat jam masuk (toleransi ±1 menit)
        if (Math.abs(nowMs - tMasuk.getTime()) <= 60000) {
            key   = 'masuk_urgent';
            level = 'urgent';
            title = '🔴 BATAS JAM MASUK TELAH TIBA!';
            text  = 'Sekarang jam ' + jamMasukStr + ' WITA. Segera lakukan presensi kehadiran Anda!';
            bTitle = '⛔ Batas Jam Masuk!';
            bBody  = 'Jam masuk ' + jamMasukStr + ' WITA telah tiba. Segera presensi!';

        // Cek TEPAT saat jam pulang (toleransi ±1 menit)
        } else if (Math.abs(nowMs - tPulang.getTime()) <= 60000) {
            key   = 'pulang_urgent';
            level = 'urgent';
            title = '🔴 BATAS JAM PULANG TELAH TIBA!';
            text  = 'Sekarang jam ' + jamPulangStr + ' WITA. Segera lakukan presensi kepulangan Anda!';
            bTitle = '🏠 Batas Jam Pulang!';
            bBody  = 'Jam pulang ' + jamPulangStr + ' WITA telah tiba. Segera presensi pulang!';

        // Cek 30 menit sebelum masuk
        } else if (Math.abs(nowMs - tMasukWarn.getTime()) <= 60000) {
            key   = 'masuk_warn';
            level = 'warning';
            title = '⚠️ Pengingat: ' + menitSebelum + ' Menit Lagi Jam Masuk';
            text  = 'Jam masuk ' + jamMasukStr + ' WITA. Bersiaplah untuk presensi kehadiran Anda.';
            bTitle = '⚠️ Pengingat Jam Masuk';
            bBody  = menitSebelum + ' menit lagi batas jam masuk (' + jamMasukStr + ' WITA). Bersiaplah!';

        // Cek 30 menit sebelum pulang
        } else if (Math.abs(nowMs - tPulangWarn.getTime()) <= 60000) {
            key   = 'pulang_warn';
            level = 'warning';
            title = '⚠️ Pengingat: ' + menitSebelum + ' Menit Lagi Jam Pulang';
            text  = 'Jam pulang ' + jamPulangStr + ' WITA. Jangan lupa presensi kepulangan.';
            bTitle = '⚠️ Pengingat Jam Pulang';
            bBody  = menitSebelum + ' menit lagi jam pulang (' + jamPulangStr + ' WITA). Jangan lupa presensi!';
        }

        if (key && _notiState.shown !== key) {
            _notiState.shown = key;
            tampilBanner(level, title, text);
            tampilBrowserNotif(bTitle, bBody);
        } else if (!key) {
            // Sembunyikan banner jika tidak ada kondisi aktif
            var b = document.getElementById('notiBanner');
            if (b.style.transform === 'translateY(0px)' || b.style.transform === 'translateY(0)') {
                if (_notiState.shown && !_notiState.shown.includes('urgent')) {
                    tutupBanner();
                }
            }
        }
    }

    // Minta izin notifikasi saat halaman dimuat
    mintaIzinNotif();

    // Cek setiap 30 detik
    setInterval(checkNotification, 30000);
    // Cek pertama setelah 2 detik (halaman sudah siap)
    setTimeout(checkNotification, 2000);

  </script>
</body>
</html>
